name: Record Daily Supply Chain Scores

on:
  schedule:
    - cron: '0 2 * * *'  # UTC 02:00 daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  record-scores:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Record scores
        run: python record_scores.py
        timeout-minutes: 15

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily score update: ${{ github.run_id }}"
          file_pattern: scores_history.json
